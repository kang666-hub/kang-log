<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KANG.LOG</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap');
  html, body { margin: 0; overflow-x: hidden; }
  .font-display { font-family: 'Space Grotesk', 'Noto Sans TC', sans-serif; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }
  .font-body { font-family: 'Noto Sans TC', sans-serif; }
  .clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
</style>
</head>
<body class="font-body" style="background:#0A0F14; color:#E7EEF2; min-height:100vh; position:relative;">

  <div style="position:fixed; inset:0; pointer-events:none; background-image: linear-gradient(rgba(77,168,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(77,168,255,0.05) 1px, transparent 1px); background-size: 48px 48px;"></div>

  <div class="relative max-w-5xl mx-auto px-4 sm:px-6 py-6 sm:py-10">

    <!-- top bar — HUD readout -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 pb-5 mb-6" style="border-bottom:1px solid rgba(231,238,242,0.10);">
      <div class="font-display font-bold text-lg tracking-tight">
        KANG<span style="color:#4DA8FF;">.LOG</span>
      </div>
      <div class="font-mono text-xs flex items-center gap-3 flex-wrap" style="color:#7E8B97;">
        <span class="flex items-center gap-1.5">
          <span class="inline-block w-1.5 h-1.5 rounded-full animate-pulse" style="background:#5FE3A0;"></span>
          ONLINE
        </span>
        <span style="color:#4D5862;">/</span>
        <span id="clock"></span>
        <span style="color:#4D5862;">/</span>
        <span>STATION 32K+500</span>
        <span style="color:#4D5862;">/</span>
        <span id="modeLabel"></span>
      </div>
    </div>

    <!-- hero -->
    <div class="mb-10">
      <div class="font-mono text-xs uppercase tracking-widest mb-3" style="color:#4DA8FF;">
        FIELD NOTES — 工程／飛行／交易
      </div>
      <h1 class="font-display font-bold text-2xl sm:text-4xl leading-tight mb-3">
        用工程的精度，記錄每一次嘗試。
      </h1>
      <p class="text-sm sm:text-base max-w-xl" style="color:#7E8B97;">
        監造工程師、FPV 飛手、交易研究者 Kang 的現場筆記與紀律練習。
      </p>
    </div>

    <!-- tabs -->
    <div id="tabs" class="flex gap-2 sm:gap-3 mb-8 flex-wrap"></div>

    <!-- card grid -->
    <div id="cards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>

    <!-- footer -->
    <div class="mt-12 pt-6 font-mono text-xs" style="border-top:1px solid rgba(231,238,242,0.10); color:#4D5862;">
      © 2026 KANG.LOG — 監造工程師／FPV 飛手／交易研究者
    </div>
  </div>

  <!-- 全螢幕閱讀浮層：點卡片展開文章用，不做獨立網址/路由 -->
  <div id="postModal" style="display:none; position:fixed; inset:0; background:rgba(5,8,11,0.92); z-index:1000; overflow-y:auto;">
    <button id="modalCloseBtn" aria-label="關閉" style="position:fixed; top:16px; right:16px; z-index:1001; width:36px; height:36px; border-radius:50%; background:#111922; border:1px solid rgba(231,238,242,0.2); color:#E7EEF2; font-size:16px; cursor:pointer;">✕</button>
    <div id="modalContent" class="max-w-2xl mx-auto px-4 sm:px-6" style="padding-top:64px; padding-bottom:60px;"></div>
  </div>

<script>
  const COLORS = {
    bg: '#0A0F14',
    panel: '#111922',
    line: 'rgba(231,238,242,0.10)',
    lineSoft: 'rgba(231,238,242,0.06)',
    textPrimary: '#E7EEF2',
    textSecondary: '#7E8B97',
    textMuted: '#4D5862',
    brand: '#4DA8FF',
  };

  // lucide icon path data (Building2 / Radio / LineChart / ArrowUpRight), inlined — no npm dependency
  const ICON_PATHS = {
    Building2: '<path d="M10 12h4"/><path d="M10 8h4"/><path d="M14 21v-3a2 2 0 0 0-4 0v3"/><path d="M6 10H4a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-2"/><path d="M6 21V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v16"/>',
    Radio: '<path d="M16.247 7.761a6 6 0 0 1 0 8.478"/><path d="M19.075 4.933a10 10 0 0 1 0 14.134"/><path d="M4.925 19.067a10 10 0 0 1 0-14.134"/><path d="M7.753 16.239a6 6 0 0 1 0-8.478"/><circle cx="12" cy="12" r="2"/>',
    LineChart: '<path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="m19 9-5 5-4-4-3 3"/>',
    ArrowUpRight: '<path d="M7 7h10v10"/><path d="M7 17 17 7"/>',
  };

  function icon(name, { size = 14, color = 'currentColor', className = '' } = {}) {
    return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${className}" style="flex-shrink:0;">${ICON_PATHS[name]}</svg>`;
  }

  const CATEGORIES = {
    eng:   { label: '工程筆記', code: 'ENG',   color: '#4DA8FF', icon: 'Building2' },
    fpv:   { label: 'FPV',      code: 'FPV',   color: '#5FE3A0', icon: 'Radio' },
    trade: { label: '交易心得', code: 'TRADE', color: '#F5B756', icon: 'LineChart' },
  };

  // 貼文資料改成動態讀取 posts.json，不再寫死在HTML裡
  let POSTS = [];

  function cornerMarks(color, size = 10) {
    const base = `position:absolute; width:${size}px; height:${size}px;`;
    return `
      <span style="${base} top:-1px; left:-1px; border-top:1px solid ${color}; border-left:1px solid ${color};"></span>
      <span style="${base} top:-1px; right:-1px; border-top:1px solid ${color}; border-right:1px solid ${color};"></span>
      <span style="${base} bottom:-1px; left:-1px; border-bottom:1px solid ${color}; border-left:1px solid ${color};"></span>
      <span style="${base} bottom:-1px; right:-1px; border-bottom:1px solid ${color}; border-right:1px solid ${color};"></span>
    `;
  }

  let activeTab = 'eng';
  let expandedId = null;

  function renderTabs() {
    const container = document.getElementById('tabs');
    container.innerHTML = Object.entries(CATEGORIES).map(([key, cat]) => {
      const isActive = key === activeTab;
      return `
        <button
          data-tab="${key}"
          class="tab-btn relative flex items-center gap-2 px-4 py-2 text-sm font-medium transition-colors duration-200"
          style="background:${isActive ? COLORS.panel : 'transparent'}; color:${isActive ? COLORS.textPrimary : COLORS.textSecondary}; border:1px solid ${isActive ? 'transparent' : COLORS.lineSoft};"
        >
          ${isActive ? cornerMarks(cat.color) : ''}
          ${icon(cat.icon, { size: 14, color: isActive ? cat.color : COLORS.textMuted })}
          ${cat.label}
        </button>
      `;
    }).join('');

    container.querySelectorAll('.tab-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        activeTab = btn.dataset.tab;
        expandedId = null;
        renderTabs();
        renderCards();
        renderModeLabel();
      });
    });
  }

  function renderCards() {
    const container = document.getElementById('cards');
    const active = CATEGORIES[activeTab];
    const filtered = POSTS.filter((p) => p.category === activeTab)
      .sort((a, b) => new Date(b.date) - new Date(a.date)); // 新到舊

    container.innerHTML = filtered.map((post) => {
      const images = post.images || [];
      const coverHtml = images.length ? `
        <div style="margin:-20px -20px 12px -20px; height:140px; overflow:hidden; border-bottom:1px solid ${COLORS.lineSoft};">
          <img src="${images[0]}" alt="" style="width:100%; height:100%; object-fit:cover; display:block;">
        </div>
      ` : '';

      return `
        <article
          class="post-card relative p-5 transition-transform duration-200 hover:-translate-y-0.5 cursor-pointer group"
          data-id="${post.id}"
          style="background:${COLORS.panel}; border:1px solid ${COLORS.lineSoft};"
        >
          ${cornerMarks('rgba(231,238,242,0.15)')}
          ${coverHtml}
          <div class="flex items-center gap-2 mb-3 font-mono text-xs uppercase tracking-wider" style="color:${active.color};">
            <span class="inline-block w-1.5 h-1.5 rounded-full" style="background:${active.color};"></span>
            ${active.label}
          </div>
          <h3 class="font-display font-bold text-base mb-2 leading-snug">${post.title}</h3>
          <p class="text-sm clamp-2 mb-4" style="color:${COLORS.textSecondary};">${post.excerpt}</p>
          <div class="flex items-center justify-between font-mono text-xs" style="color:${COLORS.textMuted};">
            <span>${post.date}</span>
            <span class="inline-flex transition-transform duration-200 group-hover:translate-x-0.5 group-hover:-translate-y-0.5">
              ${icon('ArrowUpRight', { size: 14 })}
            </span>
          </div>
        </article>
      `;
    }).join('');

    container.querySelectorAll('.post-card').forEach((card) => {
      card.addEventListener('click', () => {
        const id = Number(card.dataset.id);
        if (expandedId === id) {
          closeModal();
        } else {
          const post = filtered.find((p) => p.id === id);
          if (post) openModal(post);
        }
      });
    });
  }

  // ── 全螢幕閱讀浮層：不做獨立網址/路由，純前端state切換 ──────────
  const modalEl = document.getElementById('postModal');
  const modalContentEl = document.getElementById('modalContent');
  const modalCloseBtn = document.getElementById('modalCloseBtn');

  function openModal(post) {
    expandedId = post.id;
    const images = post.images || [];
    const bodyText = post.content || post.excerpt; // 沒填正文(或舊文章沒有content欄位)就fallback顯示摘要

    modalContentEl.innerHTML = `
      <h2 class="font-display font-bold text-2xl sm:text-3xl leading-snug mb-2">${post.title}</h2>
      <div class="font-mono text-xs mb-6" style="color:${COLORS.textMuted};">${post.date}</div>
      ${images.map((src) => `
        <img src="${src}" alt="" style="width:100%; max-height:80vh; object-fit:contain; display:block; margin-bottom:16px; background:#000;">
      `).join('')}
      <p class="text-sm sm:text-base" style="color:${COLORS.textSecondary}; white-space:pre-wrap; line-height:1.8;">${bodyText}</p>
    `;
    modalEl.style.display = 'block';
    document.body.style.overflow = 'hidden'; // 鎖住背景捲動，關閉後背景列表捲動位置才不會跑掉
  }

  function closeModal() {
    expandedId = null;
    modalEl.style.display = 'none';
    document.body.style.overflow = '';
  }

  modalCloseBtn.addEventListener('click', closeModal);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modalEl.style.display === 'block') closeModal();
  });

  function renderModeLabel() {
    const active = CATEGORIES[activeTab];
    const el = document.getElementById('modeLabel');
    el.textContent = `MODE ${active.code}`;
    el.style.color = active.color;
  }

  function updateClock() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('zh-TW', { hour12: false });
  }

  async function init() {
    renderTabs();
    renderModeLabel();
    updateClock();
    setInterval(updateClock, 1000);

    try {
      const res = await fetch('posts.json', { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      POSTS = await res.json();
    } catch (e) {
      document.getElementById('cards').innerHTML =
        `<p class="font-mono text-xs" style="color:#F5B756;">⚠️ 貼文資料載入失敗：${e.message}</p>`;
      return;
    }
    renderCards();
  }

  init();
</script>
</body>
</html>
